services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backgammon
      POSTGRES_PASSWORD: backgammon
      POSTGRES_DB: backgammon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backgammon"]
      interval: 5s
      timeout: 5s
      retries: 5

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://backgammon:backgammon@postgres:5432/backgammon
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      HTTP_PORT: "3001"
      WS_PORT: "3002"
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api.backgammon-pro.example.com
      NEXT_PUBLIC_WS_URL: wss://api.backgammon-pro.example.com
    depends_on:
      - game-server

volumes:
  pgdata:
