name = "backgammon-pro"
compatibility_date = "2024-12-01"

pages_build_output_dir = "apps/web/out"

[build]
command = "pnpm install --frozen-lockfile && pnpm --filter @backgammon/database run prisma:generate && pnpm --filter @backgammon/database run build && pnpm --filter @backgammon/web run build"

[build.environment]
NODE_VERSION = "20"
PNPM_VERSION = "9.15.0"

[[build.environment.variables]]
NEXT_PUBLIC_API_URL = "https://backgammon-pro.gokcek.workers.dev"
NEXT_PUBLIC_WS_URL = "wss://backgammon-pro.gokcek.workers.dev"
