services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backgammon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backgammon}
      POSTGRES_DB: ${POSTGRES_DB:-backgammon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backgammon}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    ports:
      - "${GAME_HTTP_PORT:-3001}:3001"
      - "${GAME_WS_PORT:-3002}:3002"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-backgammon}:${POSTGRES_PASSWORD:-backgammon}@postgres:5432/${POSTGRES_DB:-backgammon}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      HTTP_PORT: "3001"
      WS_PORT: "3002"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      NODE_ENV: production
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_PER_USER: ${RATE_LIMIT_PER_USER:-200}
      RATE_LIMIT_PER_IP: ${RATE_LIMIT_PER_IP:-300}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-30000}
      CONCURRENT_SESSION_LIMIT: ${CONCURRENT_SESSION_LIMIT:-5}
      SUSPICIOUS_LOGIN_THRESHOLD: ${SUSPICIOUS_LOGIN_THRESHOLD:-5}
      MIN_MOVE_TIME_MS: ${MIN_MOVE_TIME_MS:-100}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3002}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      game-server:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
